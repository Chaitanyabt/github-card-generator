<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --border-color: #30363d;
            --error-color: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p.subheading {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        button {
            padding: 14px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #216e39;
            cursor: not-allowed;
            transform: none;
        }

        #result-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Loading Skeleton */
        .skeleton {
            display: none;
            width: 350px;
            height: 400px;
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            border: 2px solid var(--border-color);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Card container animation */
        .card-wrapper {
            animation: fadeIn 0.6s ease-out forwards;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .share-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 8px 16px;
        }

        .share-btn:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .error-msg {
            display: none;
            color: var(--error-color);
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* SVG override if card comes as raw SVG or HTML */
        #card-content {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username</p>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false">
            <button id="generate-btn" onclick="generateCard()">
                <span>Generate Card</span>
            </button>
        </div>

        <div id="error-box" class="error-msg"></div>

        <div id="result-area">
            <div id="skeleton" class="skeleton"></div>
            
            <div id="card-wrapper" class="card-wrapper">
                <div id="card-content"></div>
                <button class="share-btn" id="copy-btn" onclick="copyToClipboard()">
                    Copy Card Link
                </button>
            </div>
        </div>
    </div>

    <script>
        let lastGeneratedUrl = '';

        async function generateCard() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim();
            const generateBtn = document.getElementById('generate-btn');
            const skeleton = document.getElementById('skeleton');
            const cardWrapper = document.getElementById('card-wrapper');
            const cardContent = document.getElementById('card-content');
            const errorBox = document.getElementById('error-box');

            if (!username) return;

            // Reset UI
            errorBox.style.display = 'none';
            cardWrapper.style.display = 'none';
            skeleton.style.display = 'block';
            generateBtn.disabled = true;
            generateBtn.innerText = 'Generating...';

            try {
                // Determine the backend URL. If running on Cloud Run, use the deployed URL.
                // Otherwise, use the BACKEND_URL environment variable replaced by envsubst.
                const backendBase = "${BACKEND_URL}" || window.location.origin.replace("frontend", "backend");
                
                const response = await fetch(`${backendBase}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });

                if (!response.ok) throw new Error('User not found or API error');

                const data = await response.json();
                
                // Set the HTML content from the agent's message
                cardContent.innerHTML = data.message;
                lastGeneratedUrl = backendBase + data.url;

                skeleton.style.display = 'none';
                cardWrapper.style.display = 'flex';
            } catch (error) {
                skeleton.style.display = 'none';
                errorBox.innerText = "Oops! We couldn't find that GitHub user. Please check the spelling.";
                errorBox.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Generate Card';
            }
        }

        function copyToClipboard() {
            const btn = document.getElementById('copy-btn');
            navigator.clipboard.writeText(lastGeneratedUrl).then(() => {
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }

        // Enter key support
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') generateCard();
        });
    </script>
</body>
</html>
